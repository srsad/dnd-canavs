services:
  db:
    image: postgres:16
    container_name: dnd-canvas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dnd_canvas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dnd_canvas"]
      interval: 5s
      timeout: 5s
      retries: 5

  back:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dnd-canvas-back
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://user:password@db:5432/dnd_canvas
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
