# Production: frontend + backend + PostgreSQL
# Запуск: docker compose up -d
# Приложение: http://localhost

services:
  db:
    image: postgres:16
    container_name: dnd-canvas-db
    restart: unless-stopped
    ports:
      # Чтобы с хоста работал npm run dev:back с DATABASE_URL=...@localhost:5432
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-dnd_canvas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-dnd_canvas}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dnd-canvas-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"

  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: dnd-canvas-back
    restart: unless-stopped
    # Чтобы с хоста работал Vite (прокси на 127.0.0.1:3000). На проде при желании закройте 3000 файрволом.
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-dnd_canvas}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_PRESIGN_EXPIRES_SEC: ${S3_PRESIGN_EXPIRES_SEC:-}
      S3_OBJECT_ACL: ${S3_OBJECT_ACL:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
    container_name: dnd-canvas-front
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - back

volumes:
  postgres_data:
